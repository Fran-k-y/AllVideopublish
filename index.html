<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllVideo Studio Lite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0e; --card-bg: #1a1a1c; --accent: #ff3e3e; --text-main: #ffffff; --text-dim: #8e8e93; --border: #2c2c2e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .app-container { width: 100%; max-width: 480px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .header { padding: 32px 24px 24px; text-align: center; background: linear-gradient(to bottom, #1f1f22, var(--card-bg)); }
        .brand-name { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }
        .brand-lite { font-size: 0.7rem; background: var(--accent); padding: 2px 8px; border-radius: 4px; text-transform: uppercase; margin-left: 5px; }
        .nav-tabs { display: flex; padding: 0 24px; gap: 20px; border-bottom: 1px solid var(--border); }
        .tab-btn { padding: 12px 4px; border: none; background: transparent; color: var(--text-dim); font-weight: 600; cursor: pointer; position: relative; }
        .tab-btn.active { color: var(--text-main); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--accent); }
        .content { padding: 24px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: white; font-family: inherit; }
        input:focus { outline: none; border-color: var(--accent); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-primary { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-stop { background: #2c2c2e; margin-top: 8px; }
        .log-container { background: #050505; height: 250px; border-radius: 12px; padding: 15px; font-family: monospace; font-size: 0.75rem; overflow-y: auto; border: 1px solid var(--border); margin-top: 10px; display: flex; flex-direction: column-reverse; }
        .log-entry { margin-bottom: 5px; line-height: 1.4; }
        .log-success { color: #22c55e; }
        .log-error { color: #ff4757; }
        footer { text-align: center; padding: 20px; font-size: 0.7rem; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="brand-name">ALLVIDEO STUDIO <span class="brand-lite">Lite</span></div>
        <p style="font-size: 0.8rem; color: var(--text-dim); margin-top: 5px;">Roblox Mass Publisher</p>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('universe', this)">Universe</button>
        <button class="tab-btn" onclick="switchTab('place', this)">Places</button>
        <button class="tab-btn" onclick="switchTab('logs', this)">Console</button>
    </div>

    <div class="content">
        <div id="universe" class="panel active">
            <div class="input-group"><label>Security Cookie</label><input type="password" id="u-cookie" placeholder=".ROBLOSECURITY"></div>
            <div class="grid-2">
                <div class="input-group"><label>Amount</label><input type="number" id="u-count" value="1"></div>
                <div class="input-group"><label>Delay (Sec)</label><input type="number" id="u-delay" value="1" step="0.5"></div>
            </div>
            <button class="btn-primary" onclick="runBatch('universe')">Start Sequence</button>
        </div>

        <div id="place" class="panel">
            <div class="input-group"><label>Universe ID</label><input type="text" id="p-universe"></div>
            <div class="grid-2">
                <div class="input-group"><label>Amount</label><input type="number" id="p-count" value="1"></div>
                <div class="input-group"><label>Delay (Sec)</label><input type="number" id="p-delay" value="1"></div>
            </div>
            <button class="btn-primary" onclick="runBatch('place')">Start Sequence</button>
        </div>

        <div id="logs" class="panel">
            <div id="log-box" class="log-container"></div>
            <button class="btn-primary btn-stop" onclick="stopAll()">Emergency Stop</button>
        </div>
    </div>
    <footer>Made for Axle | 2026</footer>
</div>

<script>
    const WORKER_URL = 'https://allvideo-api.ninoyumul0.workers.dev/';
    let isRunning = false;

    function switchTab(id, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function addLog(msg, type = '') {
        const box = document.getElementById('log-box');
        const div = document.createElement('div');
        div.className = `log-entry ${type ? 'log-' + type : ''}`;
        div.textContent = `[${new Date().toLocaleTimeString([], {hour12:false})}] ${msg}`;
        box.prepend(div);
    }

    function stopAll() { isRunning = false; addLog("STOPPED", "error"); }

    async function runBatch(type) {
        if(isRunning) return;
        const cookie = document.getElementById('u-cookie').value;
        const count = parseInt(document.getElementById(type === 'universe' ? 'u-count' : 'p-count').value);
        const delay = parseFloat(document.getElementById(type === 'universe' ? 'u-delay' : 'p-delay').value) * 1000;
        const universeId = document.getElementById('p-universe').value;

        if(!cookie) return alert("Missing Cookie");
        
        isRunning = true;
        switchTab('logs', document.querySelectorAll('.tab-btn')[2]);
        addLog(`Initiating batch: ${count} requests...`, "success");

        for(let i = 1; i <= count; i++) {
            if(!isRunning) break;
            addLog(`Requesting ${i}/${count}...`);
            
            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: type, cookie, universeId })
                });
                const data = await res.json();
                addLog(data.message, data.ok ? "success" : "error");
            } catch(e) {
                addLog("Network Error", "error");
            }

            if(i < count && isRunning) await new Promise(r => setTimeout(r, delay));
        }
        isRunning = false;
        addLog("Batch process finished.");
    }
</script>
</body>
</html>
